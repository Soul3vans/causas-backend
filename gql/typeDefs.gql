# scalar Upload

type Users {
  _id: ID
  name: String!
  email: String
  password: String!
  avatar: String
  joinDate: String
  role: Int
}

type UsersInvolved {
  userIn: Users
  status: String
}

type Litigant {
  _id: ID
  participant: String
  rut: String
  person: String
  name: String
}

type Movement {
  _id: ID
  invoice: String
  document: [DocumentItem]
  annex: String
  stage: String
  procedure: String
  descProcedure: String
  dateProcedure: String
  page: Int
  book: String
}

type DocumentItem {
  name: String
  file: String
  annexs: [AnnexItem]
  _id: ID
}

type AnnexItem {
  reference: String
  file: String
  date: String
}

type Cases {
  _id: ID
  rol: String
  cover: String
  createdBy: Users!
  admission: String
  estAdmin: String
  process: String
  location: String
  stage: String
  processState: String
  court: String
  movementsHistory: [Movement]
  litigants: [Litigant]
  extLink: String
  status: String
  createdAt: String
  updatedAt: String
  debtor: String
  visibility: Boolean
  typeSearch: String
}

type CasesViewed {
  caseBankruptcy: Cases
  viewedBy: Users
}

type Message {
  _id: ID
  messageBody: String!
  messageType: String!
  messageImage: String
}

type Messages {
  to: Users
  title: String!
  text: String!
  status: Boolean
  type: String
  createdAt: String
}

type CaseStatistics {
  CLOSED: Int
  ACTIVE: Int
  INACTIVE: Int
}

type Token {
  token: String!
}

type Posts {
  _id: ID
  title: String!
  imageUrl: String!
  categories: [String]!
  description: String!
  createdDate: String
  likes: Int
  createdBy: Users!
  message: [Message]
}

type Patients {
  _id: ID
  name: String!
  lastname: String!
  imageUrl: String!
  service: Int!
  bed: Int!
  state: Int!
  sex: Int!
  createdDate: String
  createdBy: Users
}

type Checks {
  _id: ID
  section: String!
  user: ID!
  checkDate: String!
  affectations: String
  observations: String
}

type Activity {
  _id: String
  name: String
  priority: Priority
  caseId: Cases
  startTime: String
  endTime: String
  createdBy: Users
}

type GetChecks {
  _id: ID
  section: String!
  user: Users!
  fullUser: [Users]!
  checkDate: String!
}

type p {
  checksws: [GetChecks]
  totalChecks: Int
  totalUsers: Int
}

type GetDate {
  day: Int!
  month: Int!
  year: Int!
}

type GetChecksUsers {
  _id: ID
  fullUser: Users
  section: String
  checkDate: String
  affectations: String
  Observations: String
}

type PostsPage {
  posts: [Posts]
  hasMore: Boolean
}

type LikesFaves {
  likes: Int
  favorites: [Posts]
}

type File {
  id: ID!
  filename: String!
  mimetype: String!
  path: String!
}

type ActivitiesFiles {
  program: String
  bibliography: String
  cloister: String
  minicurriculum: String
}

type Priority {
  _id: String
  name: String
  color: String
}

type PriorityResult {
  priority: Priority
  message: Message
}

type ActivityResult {
  activity: Activity
  message: Message
}

type SignedUrlResult {
  url: String
  message: Message
}

# ========== NUEVOS TIPOS PARA PROCESO ASÍNCRONO ==========

type ProcessSummary {
  newMovements: Int
  litigantsChanged: Boolean
  mainFieldsChanged: [String]
}

type ProcessStatus {
  _id: ID!
  caseId: ID!
  status: String!
  startedAt: String
  completedAt: String
  errorMessage: String
  summary: ProcessSummary
}

type UpdateCaseResult {
  messageBody: String!
  messageType: String!
  messageImage: String
  processId: ID
  success: Boolean
}

# ========== NUEVOS TIPOS PARA MÚLTIPLES CAUSAS ==========

input SearchParamsInput {
  competencia: String!
  corteId: String!
  tribunalId: String!
  libroTipo: String!
  rolNumber: String!
  year: String!
  fullRol: String!
}

input UpdateMultipleCaseInput {
  caseId: ID!
  fullRol: String!
  searchParams: SearchParamsInput!
}

input NewCauseBatchInput {
  libroTipo: String!
  rolNumber: String!
  year: String!
  competencia: String!
  corteId: String!
  tribunalId: String!
  typeSearch: String
  createdBy: ID
  involved: [InvUserInput]
}

type UpdateMultipleCaseResult {
  caseId: ID!
  fullRol: String!
  status: String!
  updated: Boolean
  newMovements: Int
  error: String
}

type BatchCaseResult {
  rol: String!
  status: String!
  id: ID
  error: String
}

type UpdateMultipleCasesResponse {
  messageBody: String!
  messageType: String!
  messageImage: String
  results: [UpdateMultipleCaseResult!]
}

type ScrapeMultipleNewCasesResponse {
  messageBody: String!
  messageType: String!
  messageImage: String
  results: [BatchCaseResult!]
}

type UpdateCasesBulkResult {
  messageBody: String!
  messageType: String!
  messageImage: String
  queued: [ID!]!     # processIds encolados exitosamente
  rejected: [ID!]!   # caseIds rechazados (no encontrados, ya en proceso, o cola llena)
}

# ========== NUEVOS TIPOS PARA PAGINACIÓN ==========

type CasesPage {
  cases: [Cases!]!
  total: Int!
  hasMore: Boolean!
}

# ========== INPUTS EXISTENTES ==========

input UsersInput {
  userId: ID
  name: String!
  avatar: String
  email: String!
  password: String
  role: Int
}

input UpdatePasswordInput {
  userId: ID!
  currentPassword: String!
  password: String!
}

input UpdateUsersPasswordInput {
  userId: ID!
  password: String!
}

input ActivityInput {
  name: String
  priority: String
  caseId: String
  startTime: String
  endTime: String
  createdBy: String
}

input ActivityUpdateInput {
  _id: String
  name: String
  priority: String
  caseId: String
  startTime: String
  endTime: String
}

input CaseInput {
  competencia: String!
  corteId: String!
  tribunalId: String!
  libroTipo: String!
  rolNumber: String!
  year: String!
  
  rol: String
  era: String
  court: String
  typeSearch: String
  createdBy: ID
  involved: [InvUserInput]
}

input UpCaseInput {
  id: String
  rol: String
  court: String
  typeSearch: String
  userId: ID
}

input InvUserInput {
  _id: ID
}

input InvUsersInput {
  userIn: InvUserInput
  status: String
}

input InvInput {
  caseId: ID!
  invUsers: [InvUsersInput!]!
}

input searchInput {
  caseId: ID
  searchTerm: String
}

input PriorityInput {
  id: String
  name: String
}

input SignedUrlInput {
  fileName: String
  cause: String
}

# ========== QUERY ==========

type Query {
  getCases(limit: Int = 20, offset: Int = 0): CasesPage!
  getCasesCount: Int!
  
  getCaseViewed: [CasesViewed]
  getCasesByUser(userId: ID!): [Cases]
  getCase(id: String!): Cases
  getCasesInfo: CaseStatistics!
  getCasesInfoAdmin: CaseStatistics!

  getUsers: [Users]!
  getUser(userId: String!): Users!
  getCurrentUser: Users
  getUserUnreadMessages(userId: ID!): [Messages]!
  getUserMessages(userId: ID!): [Messages]!
  getInvolvedUsers(caseId: String!): [UsersInvolved]!
  searchMovements(input: searchInput): [Movement]!
  getChecksOfDate(day: Int, month: Int, year: Int): [GetChecks]!
  getDateOfChecks: [GetDate]
  getChecksOfUsers(id: ID!, month: Int, year: Int): [GetChecksUsers]!
  searchUsers(searchTerm: String): [Users]!
  infiniteScrollPosts(pageNum: Int!, pageSize: Int!): PostsPage

  getPriorities: [Priority]!

  getActivities: [Activity]!
  getActivitiesByDate(days: Int!): [Activity]!

  getProcessStatus(processId: ID!): ProcessStatus
}

# ========== MUTATION ==========

type Mutation {
  addCase(input: CaseInput!): Message!
  updateCase(input: UpCaseInput!): UpdateCaseResult!
  deleteCase(caseId: ID!): Message!

  deleteActivity(id: ID!): Message!

  addInvUsers(input: InvInput!): Message!

  addPriority(input: PriorityInput!): PriorityResult!
  addActivity(input: ActivityInput!): ActivityResult!

  updateUser(params: UsersInput!): Users!
  updateUsers(input: UsersInput!): Message!
  updateUserPassword(params: UpdatePasswordInput!): Message!
  updateUsersPassword(input: UpdateUsersPasswordInput!): Message!
  updateVisibilityCase(id: ID!, visibility: Boolean!): Message!
  updateActivity(input: ActivityUpdateInput!): ActivityResult!
  updateCasesBulk(caseIds: [ID!]!, userId: ID!): UpdateCasesBulkResult!

  deleteUserPost(postId: ID!): Posts!
  deleteUser(userId: ID!): Message!
  addPostMessage(messageBody: String!, userId: ID!, postId: ID!): Message!
  signupUsers(params: UsersInput!): Message!
  signinUsers(email: String, password: String): Token!

  addDdor: Message!

  getFileSignedS3Url(input: SignedUrlInput!): SignedUrlResult!

  updateMultipleCases(cases: [UpdateMultipleCaseInput!]!): UpdateMultipleCasesResponse!
  
  scrapeMultipleNewCases(causes: [NewCauseBatchInput!]!, createdBy: ID!): ScrapeMultipleNewCasesResponse!
}
