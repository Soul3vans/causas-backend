version: '3.8'

services:
  # --- BASE DE DATOS ---
  mongo:
    image: mongo:6.0
    container_name: causas_mongo
    restart: always
    # CLAVE: Limitamos la caché de WiredTiger a 0.5GB para que no consuma los 4GB por defecto
    command: ["--wiredTigerCacheSizeGB", "0.5"]
    volumes:
      - mongo_data:/data/db
    networks:
      - causas_net
    deploy:
      resources:
        limits:
          memory: 700M # Límite duro de 700MB

  # --- COLA DE TRABAJOS Y CACHÉ ---
  redis:
    image: redis:7-alpine
    container_name: causas_redis
    restart: always
    # CLAVE: Limitamos Redis a 128MB y usamos política LRU para no llenar la RAM
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - causas_net
    deploy:
      resources:
        limits:
          memory: 150M

  # --- BACKEND (Node + Express + Apollo + Puppeteer) ---
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: causas_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=causas_concursales
      - REDIS_URL=redis://redis:6379
      # Debes pasar tus variables de entorno reales aquí o usar un .env
      - SECRET=${SECRET}
      - CORS_ORIGIN_URI=${CORS_ORIGIN_URI}
      # Variables de Nodemailer (SMTP externo)
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
    depends_on:
      - mongo
      - redis
    networks:
      - causas_net
    deploy:
      resources:
        # Puppeteer + Node necesita al menos esto para no crashear al scrapear
        limits:
          memory: 1.5G 
        reservations:
          memory: 512M

  # --- PROXY REVERSO Y FRONTEND (Nginx) ---
  nginx:
    image: nginx:1.25-alpine
    container_name: causas_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      # Montamos la configuración de Nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Montamos los archivos estáticos de Vue (generados con yarn build)
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - causas_net
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mongo_data:
  redis_data:

networks:
  causas_net:
    driver: bridge
